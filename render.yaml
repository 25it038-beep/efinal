services:
  - type: web
    name: emailsupcious
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: sqlite:///tmp/phishing_detector.db
      - key: SECRET_KEY
        value: change-me
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://*.vercel.app
